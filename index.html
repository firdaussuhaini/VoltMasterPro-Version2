<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoltMaster PRO v8.7 | Engineering Edition</title>
<style>
:root { --bg: #020617; --card-bg: #111827; --accent: #22c55e; --warning: #facc15; --text-dim: #94a3b8; --danger: #ef4444; --blue: #3b82f6; }
body { margin: 0; font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: white; line-height: 1.5; }
header { text-align: center; padding: 30px 20px; border-bottom: 2px solid var(--accent); background: #0f172a; }
.container { max-width: 700px; margin: auto; padding: 20px; }
.card { background: var(--card-bg); padding: 25px; border-radius: 18px; margin-top: 20px; border: 1px solid #1e293b; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
.card h3 { margin: 0 0 15px 0; color: var(--warning); font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
.est-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.est-table th { text-align: left; color: var(--text-dim); padding-bottom: 10px; border-bottom: 1px solid #334155; }
.est-table td { padding: 8px 0; }
input, select { width: 100%; padding: 10px; border: 1px solid #334155; border-radius: 8px; background: #0f172a; color: white; font-size: 13px; box-sizing: border-box; outline: none; }
input:focus { border-color: var(--accent); }
.read-only-input { background: #1e293b; border: none; color: var(--accent); font-weight: bold; text-align: center; }
button { width: 100%; padding: 14px; border: none; border-radius: 10px; background: var(--accent); color: #052e16; font-weight: 800; cursor: pointer; margin-top: 15px; transition: opacity 0.2s; text-transform: uppercase; font-size: 12px; }
button:hover { opacity: 0.9; }
.result-box { margin-top: 20px; padding: 20px; background: #064e3b; border: 1px solid var(--accent); border-radius: 10px; display: none; font-family: 'Courier New', monospace; font-size: 13px; white-space: pre-wrap; color: #ecfdf5; }
#phaseIndicator { padding: 10px; border-radius: 8px; text-align: center; font-size: 12px; font-weight: bold; margin-bottom: 15px; background: #1e293b; color: var(--accent); border: 1px solid #334155; }
.action-area { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
.whatsapp-btn { background: #25d366; color: white; }
.email-btn { background: var(--blue); color: white; }
label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 5px; margin-top: 10px; }
</style>
</head>
<body>

<header>
    <h1>⚡ VoltMaster PRO v8.7</h1>
    <p style="color: var(--text-dim); font-size: 13px;">Electrical Load & Compliance Calculator</p>
</header>

<div class="container">
    <div class="card">
        <h3>1. Site Load Input</h3>
        <table class="est-table">
            <thead>
                <tr>
                    <th style="width: 40%;">Load Type</th>
                    <th>Watt/Unit</th>
                    <th style="width: 15%;">Qty</th>
                    <th>Amp (A)</th>
                </tr>
            </thead>
            <tbody id="loadBody">
                <tr>
                    <td>Lighting Point</td>
                    <td><input type="number" id="wL" value="60" oninput="syncAll()"></td>
                    <td><input type="number" id="qL" value="0" oninput="syncAll()"></td>
                    <td><input id="taL" class="read-only-input" readonly></td>
                </tr>
                <tr>
                    <td>Fan Point</td>
                    <td><input type="number" id="wF" value="75" oninput="syncAll()"></td>
                    <td><input type="number" id="qF" value="0" oninput="syncAll()"></td>
                    <td><input id="taF" class="read-only-input" readonly></td>
                </tr>
                <tr>
                    <td>13A Socket Outlet</td>
                    <td><input type="number" id="wS" value="250" oninput="syncAll()"></td>
                    <td><input type="number" id="qS" value="0" oninput="syncAll()"></td>
                    <td><input id="taS" class="read-only-input" readonly></td>
                </tr>
                <tr>
                    <td>Air Conditioner</td>
                    <td>
                        <select id="uAC" onchange="syncAll()">
                            <option value="746">1.0 HP (746W)</option>
                            <option value="1119">1.5 HP (1119W)</option>
                            <option value="1492">2.0 HP (1492W)</option>
                        </select>
                    </td>
                    <td><input type="number" id="qAC" value="0" oninput="syncAll()"></td>
                    <td><input id="taAC" class="read-only-input" readonly></td>
                </tr>
                <tr>
                    <td>Water Heater</td>
                    <td>
                        <select id="uWH" onchange="syncAll()">
                            <option value="3000">3.0 kW</option>
                            <option value="3500">3.5 kW</option>
                        </select>
                    </td>
                    <td><input type="number" id="qWH" value="0" oninput="syncAll()"></td>
                    <td><input id="taWH" class="read-only-input" readonly></td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="card">
        <h3>2. System Analysis</h3>
        <label>Supply Phase</label>
        <select id="phase" onchange="syncUI()">
            <option value="1">Single Phase (240V)</option>
            <option value="3">Three Phase (415V)</option>
        </select>
        
        <div id="phaseIndicator" style="margin-top: 15px;">MODE: SINGLE PHASE (240V)</div>
        
        <label>Diversity Factor (DF / CF)</label>
        <input id="pDF" type="number" value="0.75" min="0.1" max="1" step="0.05" oninput="syncAll()">
        
        <button onclick="calcLoad()">GENERATE FINAL REPORT</button>
        
        <div id="resLoad" class="result-box"></div>
        
        <div class="action-area">
            <button class="whatsapp-btn" id="waBtn" style="display:none;" onclick="sendWhatsApp()">SEND REPORT TO WHATSAPP</button>
            <button class="email-btn" id="emailBtn" style="display:none;" onclick="sendEmail()">SEND REPORT TO EMAIL</button>
        </div>
    </div>
</div>

<script>
const PF = 0.85; 
const SQRT3 = 1.732;

function syncAll() {
    const phase = parseInt(document.getElementById("phase").value);
    const volt = (phase === 1) ? 240 : 415;
    let totalW = 0;

    const rows = [
        ['wL','qL','taL'], ['wF','qF','taF'], ['wS','qS','taS'], 
        ['uAC','qAC','taAC'], ['uWH','qWH','taWH']
    ];

    rows.forEach(r => {
        const w = parseFloat(document.getElementById(r[0]).value) || 0;
        const q = parseFloat(document.getElementById(r[1]).value) || 0;
        const subW = w * q;
        totalW += subW;
        let amp = (phase === 1) ? (subW / volt) : (subW / (SQRT3 * volt * PF));
        document.getElementById(r[2]).value = amp.toFixed(2);
    });
    return totalW;
}

function syncUI() {
    const phase = document.getElementById("phase").value;
    document.getElementById("phaseIndicator").innerText = (phase == "1") ? "MODE: SINGLE PHASE (240V)" : "MODE: THREE PHASE (415V)";
    syncAll();
}

function calcLoad() {
    const P = syncAll();
    if (P === 0) {
        alert("Please enter load quantities before generating report.");
        return;
    }

    const DF = parseFloat(document.getElementById("pDF").value);
    const phase = parseInt(document.getElementById("phase").value);
    const V = (phase === 1) ? 240 : 415;

    const MD = P * DF;
    const Ib = (phase === 1) ? (MD / V) : (MD / (SQRT3 * V * PF));
    const In = Ib * 1.25;

    const ratings = [32, 40, 63, 80, 100];
    let msRating = ratings.find(r => r >= In) || 100;
    const msType = (phase === 1) ? "DP (Double Pole)" : "TPN (Triple Pole & Neutral)";

    let incomingCable = "";
    if(phase === 1) {
        if(msRating <= 40) incomingCable = "10mm²";
        else if(msRating <= 63) incomingCable = "16mm²";
        else incomingCable = "25mm²";
    } else {
        if(msRating <= 63) incomingCable = "16mm²";
        else incomingCable = "25mm²";
    }

    const qS = parseInt(document.getElementById("qS").value) || 0;
    const qWH = parseInt(document.getElementById("qWH").value) || 0;
    let rccbSens = "100mA (0.1A)";
    if(qS > 0) rccbSens = "30mA (0.03A)";
    if(qWH > 0) rccbSens = "10mA (0.01A)";

    const qL = parseInt(document.getElementById("qL").value) || 0;
    const qF = parseInt(document.getElementById("qF").value) || 0;

    const report = `[ VOLTMASTER PRO v8.7 - LAPORAN TEKNIKAL ]
-----------------------------------------
1. RINGKASAN BEBAN UTAMA
TCL (Total Connected Load) : ${(P/1000).toFixed(2)} kW
MD (Max Demand @ CF ${DF}) : ${(MD/1000).toFixed(2)} kW
Design Current (Ib)        : ${Ib.toFixed(2)} A
Power Factor (Assumed)     : ${PF}

2. SPESIFIKASI SSB / DB
Main Switch Rating : ${msRating}A ${msType}
RCCB Sensitivity   : ${rccbSens}
Incoming Cable     : ${incomingCable} PVC/PVC (Min. Standard)

3. CADANGAN LITAR AKHIR (FINAL CIRCUITS)
-----------------------------------------
💡 LIGHTING / FAN
Kabel: 1.5mm² PVC | MCB: 10A
Bilangan Litar: ${Math.ceil((qL+qF)/10)} (Max 10 point/litar)

🔌 SOCKET OUTLET 13A
Kabel: 2.5mm² PVC | MCB: 20A/32A
Bilangan Litar: ${Math.ceil(qS/2)} (Saranan Radial)
Info: RCCB 30mA Wajib.

❄️ AIR CONDITIONER
Kabel: 2.5mm² - 4.0mm² | MCB: 20A
Bilangan Litar: ${document.getElementById("qAC").value} (Individu)

🚿 WATER HEATER
Kabel: 2.5mm² - 4.0mm² | MCB: 20A
Bilangan Litar: ${document.getElementById("qWH").value}
Info: Wajib RCCB 10mA tambahan mengikut Akta Bekalan Elektrik.
-----------------------------------------
Tarikh Jana: ${new Date().toLocaleString()}`;

    const res = document.getElementById("resLoad");
    res.style.display = "block";
    res.innerText = report;
    document.getElementById("waBtn").style.display = "block";
    document.getElementById("emailBtn").style.display = "block";
    
    res.scrollIntoView({ behavior: 'smooth' });
}

function sendWhatsApp() {
    const text = document.getElementById("resLoad").innerText;
    window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
}

function sendEmail() {
    const text = document.getElementById("resLoad").innerText;
    const subject = encodeURIComponent("VoltMaster PRO - Laporan Teknikal Elektrik");
    const body = encodeURIComponent(text);
    window.location.href = `mailto:?subject=${subject}&body=${body}`;
}

syncUI();
</script>
</body>
</html>
